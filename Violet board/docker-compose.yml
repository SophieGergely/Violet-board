services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: violetboard_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - violetboard

  nginx:
    image: nginx:alpine
    container_name: violetboard_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - violetboard

  db:
    image: postgres:15-alpine
    container_name: violetboard_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-violetboard}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - violetboard

volumes:
  pgdata:

networks:
  violetboard:
    driver: bridge
